services:
  - type: web
    name: pranu-v2-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd server && pnpm install && pnpm build
    startCommand: cd server && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: WS_PORT
        value: 4001
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: FRONTEND_URL
        value: https://pranu-v2.vercel.app
      - key: LOG_LEVEL
        value: info
